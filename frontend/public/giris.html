<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giriş Yap — NOVA STORE</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 20px 40px;
    }
    .auth-box {
      width: 100%;
      max-width: 420px;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 40px;
      color: var(--val-white);
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    .auth-logo h1 span { color: var(--val-red); }
    .auth-logo p { color: var(--val-text); font-size: 13px; margin-top: 8px; letter-spacing: 2px; }
    .divider {
      text-align: center;
      margin: 20px 0;
      position: relative;
      color: var(--val-text);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--val-border);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand">NOVA<span>STORE</span></a>
  <ul class="navbar-nav"></ul>
  <div class="navbar-user">
    <a href="kayit.html" class="btn btn-red btn-sm">Kayıt Ol</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>NOVA<span>STORE</span></h1>
      <p>GİRİŞ YAP</p>
    </div>

    <div class="card">
      <div class="card-body">
        <form id="giris-form">
          <div class="form-group">
            <label class="form-label">E-Posta</label>
            <input type="email" id="email" class="form-input" placeholder="ornek@mail.com" required />
          </div>
          <div class="form-group">
            <label class="form-label">Şifre</label>
            <input type="password" id="sifre" class="form-input" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn btn-red btn-full mt-3" id="giris-btn">
            GİRİŞ YAP
          </button>
        </form>

        <div class="divider">VEYA</div>

        <p style="text-align:center; font-size:14px; color:var(--val-text);">
          Hesabın yok mu?
          <a href="kayit.html" style="color:var(--val-red); text-decoration:none; font-weight:700;">Kayıt Ol</a>
        </p>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
  // Zaten giriş yaptıysa ana sayfaya yönlendir
  if (kullanici.al() && token.al()) {
    window.location.href = '/index.html';
  }

  document.getElementById('giris-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('giris-btn');
    btn.disabled = true;
    btn.textContent = 'GİRİŞ YAPILIYOR...';

    try {
      const veri = await Auth.giris({
        email: document.getElementById('email').value,
        sifre: document.getElementById('sifre').value
      });

      token.kaydet(veri.token);
      kullanici.kaydet(veri.kullanici);
      toast('Giriş başarılı! Yönlendiriliyorsunuz...', 'basari');

      setTimeout(() => {
        const k = veri.kullanici;
        if (k.rol === 'admin') window.location.href = '/admin.html';
        else if (k.rol === 'yetkili') window.location.href = '/yetkili.html';
        else window.location.href = '/index.html';
      }, 1000);
    } catch (err) {
      toast(err.message, 'hata');
      btn.disabled = false;
      btn.textContent = 'GİRİŞ YAP';
    }
  });
</script>
</body>
</html>
